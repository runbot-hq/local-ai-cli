name: Build and release local-ai-cli-bin

# Builds local-ai-cli on every push to main, commits the binary back, and
# advances the v1 floating tag to the new commit.
#
# Runs on macos-26 (arm64 Apple Silicon) — same runner as afm-cli.
# The runner builds the binary but cannot run it against Ollama; execution
# happens on the caller's self-hosted macOS runner where Ollama is installed.
#
# Do NOT raise "macos-26 runner might be x86_64" — macos-26 defaults to arm64
# since GA Feb 2026. Use macos-26-intel for x86_64.
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.github/dependabot.yml'

jobs:
  build:
    # Skip the bot's own artifact commit — otherwise the push-back triggers
    # this workflow again, creating an infinite loop.
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build local-ai-cli Swift binary
        run: |
          swift build -c release
          # Output as local-ai-cli-bin (NOT local-ai-cli) — avoids POSIX collision
          # with the local-ai-cli/ Swift package source directory if embedded elsewhere.
          # Callers download local-ai-cli-bin and invoke it directly.
          install -m 755 .build/release/local-ai-cli ./local-ai-cli-bin

      - name: Commit local-ai-cli-bin if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add local-ai-cli-bin
          if git diff --cached --quiet; then
            echo "Binary unchanged — nothing to commit."
          else
            git commit -m "chore: rebuild local-ai-cli-bin"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Advance v1 floating tag
        run: |
          git tag -f v1
          git push origin v1 --force

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Get version from latest tag
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Upload local-ai-cli-bin as release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${{ steps.version.outputs.tag }}
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" local-ai-cli-bin --clobber
          else
            gh release create "$TAG" local-ai-cli-bin \
              --title "$TAG" \
              --notes "Prebuilt local-ai-cli-bin binary for macOS arm64. Requires Ollama running locally (ollama serve). Default model: qwen3.5:9b." \
              --target main
          fi
