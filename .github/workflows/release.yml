name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: [self-hosted, macos-m1]

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build (release)
        run: swift build -c release

      - name: Copy binary
        run: |
          cp .build/release/local-ai-cli local-ai-cli-bin
          chmod +x local-ai-cli-bin

      - name: Commit updated binary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f local-ai-cli-bin
          git diff --cached --quiet || git commit -m "chore: update binary for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: local-ai-cli-bin
          generate_release_notes: false
          body: |
            Pre-built arm64 binary for macOS (Apple Silicon).

            ## Usage
            ```sh
            curl -L https://github.com/runbot-hq/local-ai-cli/releases/download/${{ github.ref_name }}/local-ai-cli-bin \
              -o local-ai-cli-bin && chmod +x local-ai-cli-bin
            ```

            Requires [Ollama](https://ollama.com) running locally (`brew services start ollama`).
